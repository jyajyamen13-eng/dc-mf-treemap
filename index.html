<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桜千株式会社 — お金のブロックパズル (2026-07-18 09:00 JST)</title>

  <!-- Inter (英数字) + Noto Sans JP (日本語) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ════════════════════════════════════════════════════════
     * デザイントークン  — デジタル庁 Design System 準拠
     * ════════════════════════════════════════════════════════ */
    :root {
      /* Blue family (primary) */
      --blue-50:  #EEF2FF;
      --blue-100: #D9E6FF;
      --blue-300: #9DB7F9;
      --blue-500: #4979F5;
      --blue-700: #264AF4;
      --blue-900: #0017C1;

      /* Neutrals */
      --gray-0:   #FFFFFF;
      --gray-50:  #FAFAFB;
      --gray-100: #F4F5F7;
      --gray-200: #E8EAEE;
      --gray-300: #D5D8DE;
      --gray-400: #A0A4AB;
      --gray-500: #6B7280;
      --gray-700: #3F4451;
      --gray-900: #1A1A1A;

      /* Semantic — 利益/CF 系統（落ち着いたゴールド） */
      --gold-50:  #FFFBEB;
      --gold-100: #FEF3C7;
      --gold-300: #F5D070;
      --gold-500: #C99830;
      --gold-700: #8A6313;

      /* Semantic — 粗利系統（深い緑） */
      --green-50:  #ECFDF5;
      --green-100: #D1FAE5;
      --green-300: #6EE7B7;
      --green-500: #10B981;
      --green-700: #047857;

      /* Semantic — 変動費・固定費 警告系統（控えめな赤橙） */
      --warn-50:  #FFF7ED;
      --warn-100: #FFEDD5;
      --warn-300: #FDBA74;
      --warn-500: #F97316;
      --warn-700: #C2410C;

      /* 影 */
      --shadow-xs: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.08), 0 2px 4px -2px rgba(15, 23, 42, 0.04);
      --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, 0.08), 0 4px 6px -4px rgba(15, 23, 42, 0.04);

      /* Radius */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;

      /* タイポグラフィ */
      --font-sans: "Inter", "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Meiryo", "Yu Gothic", sans-serif;
      --font-num:  "Inter", "Noto Sans JP", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: var(--font-sans);
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      line-height: 1.5;
      font-feature-settings: "tnum" 1, "palt" 1;
    }

    /* ════════════════════════════════════════════════════════
     * ヘッダー
     * ════════════════════════════════════════════════════════ */
    header.app-header {
      background: var(--gray-0);
      border-bottom: 1px solid var(--gray-200);
      padding: 20px 40px 18px;
    }
    .header-inner {
      max-width: 1560px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }
    .brand-block { display: flex; align-items: center; gap: 14px; }
    .brand-mark {
      width: 36px; height: 36px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--blue-500) 0%, var(--blue-700) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-md);
      color: #fff; font-weight: 700; font-size: 1rem; letter-spacing: 0.05em;
    }
    .brand-text h1 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gray-900);
      letter-spacing: 0.01em;
      line-height: 1.3;
    }
    .brand-text .subtitle {
      font-size: 0.72rem;
      color: var(--gray-500);
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    .header-controls { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    #period-label {
      font-size: 0.78rem;
      color: var(--gray-500);
      font-weight: 500;
      padding: 8px 14px;
      background: var(--gray-100);
      border-radius: var(--radius-sm);
      letter-spacing: 0.01em;
      font-variant-numeric: tabular-nums;
    }

    /* 部門切替ピル */
    .dept-pills {
      display: inline-flex;
      background: var(--gray-100);
      border-radius: 9px;
      padding: 3px;
      gap: 2px;
    }
    .dept-pills button {
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--gray-500);
      padding: 7px 14px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.02em;
    }
    .dept-pills button:hover { color: var(--gray-900); }
    .dept-pills button.active {
      background: var(--gray-0);
      color: var(--blue-700);
      font-weight: 600;
      box-shadow: var(--shadow-xs);
    }
    /* 旧 select は非表示で残す（互換用） */
    #dept-select { display: none; }

    /* 会計期切替ピル（standalone モードでのみ可視化される）。
       server.py 経路では JS で表示制御しないので display:none のまま。 */
    .fy-pills {
      display: none;
      background: var(--blue-50);
      border-radius: 9px;
      padding: 3px;
      gap: 2px;
      border: 1px solid var(--blue-100);
    }
    .fy-pills button {
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--blue-700);
      padding: 7px 12px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .fy-pills button:hover { background: var(--blue-100); }
    .fy-pills button.active {
      background: var(--blue-700);
      color: var(--gray-0);
      font-weight: 600;
      box-shadow: var(--shadow-xs);
    }
    .fy-pills button .fy-sub {
      display: block;
      font-size: 0.65rem;
      opacity: 0.75;
      font-weight: 400;
      margin-top: 1px;
    }

    /* データなし期用プレースホルダー */
    .no-data-block {
      background: var(--gray-0);
      border: 1px dashed var(--gray-300);
      border-radius: var(--radius-lg);
      padding: 60px 40px;
      text-align: center;
      box-shadow: var(--shadow-xs);
      margin-top: 24px;
    }
    .no-data-block .no-data-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 14px;
    }
    .no-data-block .no-data-note {
      font-size: 0.95rem;
      color: var(--warn-700);
      background: var(--warn-50);
      border: 1px solid var(--warn-100);
      border-radius: var(--radius-md);
      padding: 12px 18px;
      max-width: 720px;
      margin: 0 auto 18px;
      line-height: 1.6;
    }
    .no-data-block .no-data-hint {
      font-size: 0.85rem;
      color: var(--gray-500);
    }

    #refresh-btn {
      padding: 8px 16px;
      background: var(--gray-900);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.76rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
      letter-spacing: 0.02em;
    }
    #refresh-btn:hover { background: #000; }
    #refresh-btn:active { transform: translateY(1px); }
    #refresh-btn:disabled { background: var(--gray-300); color: var(--gray-500); cursor: not-allowed; }

    /* ════════════════════════════════════════════════════════
     * メインコンテナ
     * ════════════════════════════════════════════════════════ */
    main {
      max-width: 1560px;
      margin: 28px auto;
      padding: 0 28px 56px;
    }

    /* ════════════════════════════════════════════════════════
     * KPI ストリップ — 上部の主要指標 4 枚
     * ════════════════════════════════════════════════════════ */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: var(--gray-0);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      box-shadow: var(--shadow-xs);
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--blue-500);
      border-radius: 0 2px 2px 0;
    }
    .kpi-card.kpi-revenue::before { background: var(--blue-500); }
    .kpi-card.kpi-gross::before   { background: var(--green-500); }
    .kpi-card.kpi-profit::before  { background: var(--gold-500); }
    .kpi-card.kpi-cash::before    { background: var(--gold-700); }

    .kpi-label {
      font-size: 0.72rem;
      color: var(--gray-500);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .kpi-value {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--gray-900);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.015em;
      line-height: 1.1;
      font-family: var(--font-num);
    }
    .kpi-sub {
      font-size: 0.72rem;
      color: var(--gray-500);
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
    }
    .kpi-sub strong {
      color: var(--gray-700);
      font-weight: 600;
    }

    /* ════════════════════════════════════════════════════════
     * パズルカード — ブロックパズルのコンテナ
     * ════════════════════════════════════════════════════════ */
    .puzzle-card {
      background: var(--gray-0);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-xs);
      padding: 22px 26px 26px;
      margin-bottom: 18px;
    }
    .card-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 14px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .card-head h2 {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--gray-900);
      letter-spacing: 0.01em;
    }
    .card-head .head-sub {
      font-size: 0.72rem;
      color: var(--gray-500);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* ────  構造式チップ列 ──── */
    .formula-row {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 16px;
      padding: 10px 12px;
      background: var(--gray-50);
      border-radius: var(--radius-sm);
      align-items: center;
    }
    .formula-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.7rem;
      color: var(--gray-700);
      letter-spacing: 0.02em;
      font-weight: 500;
      white-space: nowrap;
    }
    .formula-chip .em { font-weight: 700; }
    .formula-chip.gross .em   { color: var(--green-700); }
    .formula-chip.fixed .em   { color: var(--warn-700); }
    .formula-chip.profit .em  { color: var(--gold-700); }
    .formula-divider {
      width: 1px;
      height: 14px;
      background: var(--gray-300);
    }

    .formula-note {
      font-size: 0.66rem;
      color: var(--gray-400);
      margin-bottom: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    /* ──── 配賦注記（クラスタ時のみ）──── */
    #cluster-allocation-note {
      display: none;
      font-size: 0.72rem;
      color: var(--warn-700);
      margin-bottom: 16px;
      padding: 9px 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      background: var(--warn-50);
      border-left: 3px solid var(--warn-500);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }

    /* ════════════════════════════════════════════════════════
     * パズル本体 + CF 拡張を横並びにするフレックス
     * ════════════════════════════════════════════════════════ */
    .puzzle-row-wrap {
      overflow-x: auto;
      overflow-y: visible;
      margin: 0 -2px;  /* スクロールバー領域確保 */
      padding: 2px;
    }
    .puzzle-row {
      display: flex;
      align-items: flex-start;
      background: var(--gray-50);
      border-radius: var(--radius-md);
      padding: 14px;
      overflow: visible;
      min-width: 1100px;  /* モバイルでも横スクロールで全体が見える */
    }

    /* パズル本体コンテナ */
    #puzzle-canvas {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    /* CF 拡張コンテナ（puzzle-row 右側） */
    #cf-extension-row {
      position: relative;
      flex: 0 0 auto;
      margin-left: 14px;
      padding-left: 14px;
      border-left: 1px solid var(--gray-200);
      overflow: visible;
    }

    /* ════════════════════════════════════════════════════════
     * 各ブロック（absolute配置）
     * ════════════════════════════════════════════════════════ */
    .bp-cell {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: filter 0.15s;
    }
    .bp-cell:hover { filter: brightness(0.98); }

    .bp-cell .cell-label,
    .fixed-sub-cell .cell-label {
      font-size: 0.82rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.35;
      letter-spacing: 0.02em;
    }
    .bp-cell .cell-amount,
    .fixed-sub-cell .cell-amount {
      font-size: 1.05rem;
      font-weight: 700;
      margin-top: 6px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      font-family: var(--font-num);
    }

    /* 固定費内部の人件費・その他固定費（flex子として積む） */
    .fixed-sub-cell {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      flex-shrink: 0;
      overflow: hidden;
    }

    /* ──── 配色（一貫したカラーシステム）──── */
    .cell-revenue   { background: var(--blue-100);  color: var(--blue-900); }
    .cell-variable  { background: var(--gray-100);  color: var(--gray-700); }
    .cell-gross     { background: var(--green-100); color: var(--green-700); }
    .cell-fixed     { background: var(--warn-50);   color: var(--warn-700); }
    .cell-personnel { background: var(--gray-50);   color: var(--gray-700); }
    .cell-other     { background: var(--gray-100);  color: var(--gray-700); }
    .cell-profit    { background: var(--gold-100);  color: var(--gold-700); }

    .cell-revenue .cell-label,   .cell-revenue .cell-amount   { color: var(--blue-900); }
    .cell-variable .cell-label,  .cell-variable .cell-amount  { color: var(--gray-700); }
    .cell-gross .cell-label,     .cell-gross .cell-amount     { color: var(--green-700); }
    .cell-personnel .cell-label, .cell-personnel .cell-amount { color: var(--gray-700); }
    .cell-other .cell-label,     .cell-other .cell-amount     { color: var(--gray-700); }
    .cell-profit .cell-label,    .cell-profit .cell-amount    { color: var(--gold-700); }

    /* ──── インラインタグ（粗利率・労働分配率）──── */
    /* 旧 oval-badge を置き換え。ブロックの角に控えめに配置 */
    .inline-tag {
      position: absolute;
      background: var(--gray-0);
      border: 1px solid var(--gray-200);
      border-radius: 999px;
      padding: 5px 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
      box-shadow: var(--shadow-sm);
      font-family: var(--font-num);
    }
    .inline-tag .tag-label {
      font-size: 0.66rem;
      color: var(--gray-500);
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .inline-tag .tag-value {
      font-size: 0.82rem;
      color: var(--gray-900);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
    }

    /* ──── 本社経費オーバーレイ（クラスタ表示時のみ）──── */
    .hq-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      pointer-events: none;
      z-index: 4;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }
    .hq-overlay-top {
      width: 100%;
      background: rgba(249, 115, 22, 0.18);
      border-bottom: 1px dashed rgba(194, 65, 12, 0.5);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 4px 4px 3px;
      min-height: 0;
    }
    .hq-overlay-label {
      font-size: 0.58rem;
      color: var(--warn-700);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .hq-overlay-pct {
      font-size: 0.66rem;
      color: var(--warn-700);
      font-weight: 700;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }

    /* ════════════════════════════════════════════════════════
     * CF 拡張エリア — シンプル化（前バージョンの ①②③ バッジ等は撤廃）
     * ════════════════════════════════════════════════════════ */
    .cf-cell {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
      border-radius: 4px;
      transition: filter 0.15s;
      padding: 2px 4px;
      box-sizing: border-box;
      min-width: 0;
    }
    .cf-cell:hover { filter: brightness(0.98); }
    .cf-cell .cf-label {
      font-size: 0.7rem;
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: 0.02em;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cf-cell .cf-amount {
      font-size: 0.82rem;
      font-weight: 700;
      margin-top: 2px;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em;
      font-family: var(--font-num);
      white-space: nowrap;
    }
    .cell-tax          { background: var(--gray-50);  }
    .cell-tax .cf-label, .cell-tax .cf-amount    { color: var(--gray-700); }
    .cell-net-income   { background: var(--gold-50); }
    .cell-net-income .cf-label, .cell-net-income .cf-amount { color: var(--gold-700); }
    .cell-depreciation { background: var(--gray-100); }
    .cell-depreciation .cf-label, .cell-depreciation .cf-amount { color: var(--gray-700); }
    .cell-cash-gen     { background: var(--gold-100); border: 1.5px solid var(--gold-300); }
    .cell-cash-gen .cf-label, .cell-cash-gen .cf-amount     { color: var(--gold-700); }
    .cell-cash-gen .cf-amount { font-size: 0.95rem; }

    .cf-cell .cf-foot {
      font-size: 0.56rem;
      color: var(--gold-700);
      opacity: 0.75;
      margin-top: 3px;
      line-height: 1.25;
      padding: 0 2px;
      font-weight: 500;
      max-width: 100%;
    }

    /* CF 上部の小ヘッダー（控えめ） */
    .cf-section-mini {
      font-size: 0.66rem;
      font-weight: 700;
      color: var(--gray-500);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
      padding-left: 2px;
    }

    /* ════════════════════════════════════════════════════════
     * AI コメントカード
     * ════════════════════════════════════════════════════════ */
    .commentary-card {
      background: var(--gray-0);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-xs);
      padding: 22px 26px;
      margin-bottom: 18px;
    }
    .commentary-card h2 {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--gray-700);
      margin-bottom: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .commentary-card h2::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--blue-500);
      box-shadow: 0 0 0 3px var(--blue-50);
    }
    #commentary-text {

    /* ════════════════════════════════════════════════════════
     * 内訳テーブル
     * ════════════════════════════════════════════════════════ */
    .breakdown-section {
      background: var(--gray-0);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-xs);
      overflow: hidden;
      margin-bottom: 18px;
    }
    .breakdown-section > details > summary {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gray-700);
      letter-spacing: 0.02em;
      padding: 16px 26px;
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.1s;
    }
    .breakdown-section > details > summary::-webkit-details-marker { display: none; }
    .breakdown-section > details > summary::before {
      content: "";
      width: 8px; height: 8px;
      border-right: 1.5px solid var(--gray-500);
      border-bottom: 1.5px solid var(--gray-500);
      transform: rotate(-45deg);
      transition: transform 0.15s;
    }
    .breakdown-section > details[open] > summary::before {
      transform: rotate(45deg);
    }
    .breakdown-section > details > summary:hover { background: var(--gray-50); }
    .breakdown-section > details[open] > summary { border-bottom: 1px solid var(--gray-200); }
    .breakdown-inner { padding: 20px 26px 24px; }
    .breakdown-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }
    .breakdown-col h3 {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--gray-500);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--gray-200);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .breakdown-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--gray-100);
      font-size: 0.82rem;
    }
    .breakdown-item:last-child { border-bottom: none; }
    .breakdown-item .item-name { color: var(--gray-700); flex: 1; padding-right: 8px; font-weight: 400; }
    .breakdown-item .item-amount { font-weight: 600; color: var(--gray-900); white-space: nowrap; font-variant-numeric: tabular-nums; font-family: var(--font-num); }
    .breakdown-item .item-pct { font-size: 0.68rem; color: var(--gray-400); margin-left: 8px; white-space: nowrap; font-variant-numeric: tabular-nums; }

    /* ════════════════════════════════════════════════════════
     * ローディング / エラー
     * ════════════════════════════════════════════════════════ */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 240px;
      font-size: 0.9rem;
      color: var(--gray-400);
      font-weight: 500;
      letter-spacing: 0.02em;

    .error-msg {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: var(--radius-md);
      padding: 18px 22px;
      color: #991B1B;
      margin: 20px 0;
      font-size: 0.9rem;
    }

    /* ════════════════════════════════════════════════════════
     * レスポンシブ
     * ════════════════════════════════════════════════════════ */
    @media (max-width: 1100px) {

      main { padding: 0 16px 32px; margin: 18px auto; }

      .kpi-card { padding: 14px 16px; }
      .kpi-value { font-size: 1.3rem; }
      .puzzle-card { padding: 18px 16px; }
      .puzzle-row { padding: 8px; }
      .formula-row { font-size: 0.66rem; }
    }

    /* 印刷 */
    @media print {
      body { background: #fff; }
      header.app-header { box-shadow: none; }

        border: 1px solid var(--gray-300);
        page-break-inside: avoid;
      }
      #refresh-btn { display: none; }
    }

<body>

<header class="app-header">
  <div class="header-inner">
    <div class="brand-block">
      <div class="brand-mark">桜</div>
      <div class="brand-text">
        <h1>桜千株式会社 — お金のブロックパズル</h1>
        <div class="subtitle">マネーフォワード クラウド会計 ・ 和仁達也方式</div>
      </div>
    </div>
    <div class="header-controls">
      <!-- 会計期切替ピル (standalone モードでのみ JS が visible にする) -->
      <div class="fy-pills" id="fy-pills">
        <!-- ボタン中身は standalone ビルド時にデータから動的生成しても良いが、
             簡素化のため固定で 2 期分を入れておく。data-fy-key は build 側の
             default_year_key / year_key と整合させる必要あり。 -->
      </div>
      <div class="dept-pills" id="dept-pills">
        <button data-val="" class="active">全社合計</button>
        <button data-val="cluster:工事部">工事部</button>
        <button data-val="cluster:事業開発部">事業開発部</button>
      </div>
      <select id="dept-select">
        <option value="">全社合計</option>
        <option value="cluster:工事部">工事部</option>
        <option value="cluster:事業開発部">事業開発部</option>
      </select>
      <span id="period-label">読み込み中...</span>
      <button id="refresh-btn">更新</button>
    </div>
  </div>
</header>

<main id="main-content">
  <div class="loading">データを読み込んでいます...</div>
</main>

<script>
/* ═══════════════════════════════════════════════════════
 * フォーマットユーティリティ
 * ═══════════════════════════════════════════════════════ */
const fmt = (v) => {
  if (v == null || isNaN(v)) return '—';
  const abs  = Math.abs(v);
  const sign = v < 0 ? '-' : '';
  if (abs >= 100_000_000) return sign + (abs / 100_000_000).toFixed(1) + '億円';
  if (abs >= 10_000)      return sign + Math.round(abs / 10_000).toLocaleString() + '万円';
  return sign + abs.toLocaleString() + '円';
};
const toMan = (v) => Math.round((v || 0) / 10_000);
const fmtMan = (man) => {
  if (man == null || isNaN(man)) return '—';
  const abs  = Math.abs(man);
  const sign = man < 0 ? '-' : '';
  return sign + abs.toLocaleString() + '万円';
};
const pctStr = (part, whole) => {
  if (!whole) return '—';
  return (part / whole * 100).toFixed(1) + '%';
};
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

/* ═══════════════════════════════════════════════════════
 * 状態
 * ═══════════════════════════════════════════════════════ */
let _currentSelectVal = '';

/* ═══════════════════════════════════════════════════════
 * データ取得（server.py 連携時）
 * ═══════════════════════════════════════════════════════ */
async function loadData(selectVal) {
  // standalone mode: embedded data から読み出し（API call なし）
  const all = window.__EMBEDDED_DATA__;
  if (!all || !Array.isArray(all.fiscal_years)) {
    throw new Error('埋め込みデータが見つかりません (window.__EMBEDDED_DATA__.fiscal_years)');
  }
  // 現在選択中の会計期を取得
  const fyKey = window.__currentFyKey || all.default_year_key;
  const fyEntry = all.fiscal_years.find(f => f.year_key === fyKey);
  if (!fyEntry) {
    throw new Error('会計期データが見つかりません: ' + fyKey);
  }
  // データなし期の場合は明示的にシグナルを返す（render 側で UI 切替）
  if (!fyEntry.data_available) {
    return {
      bp: null,
      commentary: '',
      _no_data: true,
      _fy_label: fyEntry.year_label,
      _fy_period: fyEntry.period,
      _fy_note: fyEntry.note || 'データなし'
    };
  }
  // 部門キーの解決
  let key;
  if (!selectVal) {
    key = '全社合計';
  } else if (selectVal.startsWith('cluster:')) {
    key = selectVal.slice('cluster:'.length);
  } else {
    // department_id 直接指定は standalone では未対応 → 全社合計にフォールバック
    key = '全社合計';
  }
  const entry = fyEntry[key];
  if (!entry || !entry.bp) {
    throw new Error('埋め込みデータにキーがありません: ' + fyKey + '/' + key);
  }
  return {
    bp: entry.bp,
    commentary: entry.commentary || '',
    _fy_label: fyEntry.year_label,
    _fy_period: fyEntry.period
  };
}

/* ═══════════════════════════════════════════════════════
 * 部門ピル初期化
 * ═══════════════════════════════════════════════════════ */
async function initDeptSelector() {
  const pills = document.getElementById('dept-pills');
  const sel = document.getElementById('dept-select');
  if (!pills) return;

  pills.addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-val]');
    if (!btn) return;
    pills.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
    const val = btn.dataset.val;
    if (sel) sel.value = val;
    _currentSelectVal = val;
    const label = btn.textContent;
    document.getElementById('main-content').innerHTML =
      `<div class="loading">${label} のデータを読み込んでいます...</div>`;
    try {
      const result = await loadData(_currentSelectVal);
      if (result._no_data) {
        document.getElementById('main-content').innerHTML = renderNoDataPlaceholder(result);
        document.getElementById('period-label').textContent =
          (result._fy_label || '') + ' ' + (result._fy_period || '');
        _bpData = null;
        _bpCmt = '';
        return;
      }
      _bpData = result.bp;
      _bpCmt  = result.commentary;
      render(result.bp, result.commentary);
      if (result._fy_label) {
        document.getElementById('period-label').textContent =
          result._fy_label + ' ' + (result._fy_period || '');
      }
    } catch (e) {
      document.getElementById('main-content').innerHTML =
        `<div class="error-msg">データ読み込みエラー: ${e.message}</div>`;
    }
  });
}

/* ═══════════════════════════════════════════════════════
 * CF 拡張描画 — シンプル化版
 *   - ①②③ バッジ撤廃
 *   - ＋ ＝ 演算子撤廃（タイトルで補足）
 *   - 太い SVG 矢印 + "減価償却費の繰戻" テキスト撤廃
 *   - CF パネルのフローティングヘッダー撤廃 → カード上に控えめなラベル
 * ═══════════════════════════════════════════════════════ */
function renderCFExtension(bp, layout) {
  const canvas    = document.getElementById('puzzle-canvas');
  const cfRow     = document.getElementById('cf-extension-row');
  const puzzleRow = canvas ? canvas.parentElement : null;
  if (!canvas || !cfRow || !puzzleRow) return;

  const profitVal   = bp.profit         || 0;
  const taxAmt      = bp.income_taxes   || 0;
  const netInc      = bp.net_income     || (profitVal - taxAmt);
  const depr        = bp.depreciation   || 0;
  const cashGen     = bp.cash_generation || (netInc + depr);

  const { vcH, opH, subH, PUZZLE_H } = layout;

  const profitTop = vcH + subH;
  const cfH       = opH;
  const CF_COL_W  = 130;
  // 比率厳守。MIN_CELL_H clamp は使わない（合計が cfH を超えるのを防ぐ）
  const MIN_CELL_H = 1;
  const LABEL_MIN_H = 16;  // テキスト表示するための最小高さ

  // ── 万円整合性 ──
  const profit_man_adj = layout.op_man_adj;
  const taxAmt_man     = toMan(taxAmt);
  const netInc_man     = profit_man_adj - taxAmt_man;
  const depr_man       = toMan(depr);
  const cashGen_man    = netInc_man + depr_man;

  // ── Col1 (法人税 / 税引後利益) 比率厳守: taxH + netH = cfH ──
  let taxH;
  if (profitVal > 0 && taxAmt > 0) {
    taxH = Math.round(cfH * taxAmt / profitVal);
    taxH = Math.max(0, Math.min(taxH, cfH));
  } else {
    taxH = 0;
  }
  const netH = cfH - taxH;  // 残りが税引後利益、合計厳守

  // ── Col2/Col3 比率厳守: cfCol2H = cfH × cashGen / netInc ──
  let cfCol2H;
  if (netInc > 0 && cashGen > 0) {
    cfCol2H = Math.round(cfH * cashGen / netInc);
    cfCol2H = Math.max(0, cfCol2H);
  } else {
    cfCol2H = 0;
  }
  const cfCol2TopOffset = cfCol2H - cfH;
  const col2Top = profitTop - cfCol2TopOffset;

  // ── Col2 内訳 (減価償却 / 税引後利益再掲) 比率厳守: deprH + netH2 = cfCol2H ──
  let deprH;
  if (cashGen > 0 && depr > 0) {
    deprH = Math.round(cfCol2H * depr / cashGen);
    deprH = Math.max(0, Math.min(deprH, cfCol2H));
  } else {
    deprH = 0;
  }
  const netH2 = cfCol2H - deprH;  // 残りが税引後利益再掲

  // ── ラベル表示判定 (ブロックが小さすぎたら inner 非表示) ──
  const taxLabelHidden    = taxH    < LABEL_MIN_H;
  const netLabelHidden    = netH    < LABEL_MIN_H;
  const deprLabelHidden   = deprH   < LABEL_MIN_H;
  const netH2LabelHidden  = netH2   < LABEL_MIN_H;
  const cfGenLabelHidden  = cfCol2H < LABEL_MIN_H;

  // cf-extension-row サイズ
  const COL_GAP = 6;
  const totalCFW = CF_COL_W * 3 + COL_GAP * 2;
  cfRow.style.width  = totalCFW + 'px';
  // 利益セルが小さい場合 CF セルは MIN_CELL_H 制約で下に伸びるため、
  // 実際の Col1 底辺 (profitTop + taxH + netH) を考慮して高さを決定
  const cfCol1Bottom = profitTop + taxH + netH;
  cfRow.style.height = Math.max(PUZZLE_H, cfCol1Bottom) + 'px';

  // 各セルは canvas 相対座標（top:profitTop など）でそのまま配置
  // ※ ヘッダーラベルは canvas 上端に重ねず変動費セルの上に配置（5px のみオフセット）
  const cfHtml = `
    <!-- 控えめなヘッダー（変動費セルの右側、上端） -->
    <div class="cf-section-mini" style="
      position:absolute; top:6px; left:2px; margin:0; z-index:5;
    ">キャッシュフロー生成</div>

    <!-- Col1: 法人税等 -->
    <div class="cf-cell cell-tax" style="
      left:0; top:${profitTop}px;
      width:${CF_COL_W}px; height:${taxH}px;
    " title="法人税等 ${fmt(taxAmt)}">
      ${taxLabelHidden ? '' : `<div class="cf-label">法人税等</div><div class="cf-amount">${fmt(taxAmt)}</div>`}
    </div>
    <!-- Col1: 税引後利益 -->
    <div class="cf-cell cell-net-income" style="
      left:0; top:${profitTop + taxH}px;
      width:${CF_COL_W}px; height:${netH}px;
    " title="税引後利益 ${fmtMan(netInc_man)}">
      ${netLabelHidden ? '' : `<div class="cf-label">税引後利益</div><div class="cf-amount">${fmtMan(netInc_man)}</div>`}
    </div>

    <!-- Col2: 減価償却費 -->
    <div class="cf-cell cell-depreciation" style="
      left:${CF_COL_W + COL_GAP}px; top:${col2Top}px;
      width:${CF_COL_W}px; height:${deprH}px;
    " title="減価償却費 ${fmtMan(depr_man)}">
      ${deprLabelHidden ? '' : `<div class="cf-label">減価償却費</div><div class="cf-amount">${fmtMan(depr_man)}</div>`}
    </div>
    <!-- Col2: 税引後利益(再掲) -->
    <div class="cf-cell cell-net-income" style="
      left:${CF_COL_W + COL_GAP}px; top:${col2Top + deprH}px;
      width:${CF_COL_W}px; height:${netH2}px;
    " title="税引後利益 ${fmtMan(netInc_man)}">
      ${netH2LabelHidden ? '' : `<div class="cf-label">税引後利益</div><div class="cf-amount">${fmtMan(netInc_man)}</div>`}
    </div>

    <!-- Col3: CF 生成額 -->
    <div class="cf-cell cell-cash-gen" style="
      left:${CF_COL_W * 2 + COL_GAP * 2}px; top:${col2Top}px;
      width:${CF_COL_W}px; height:${cfCol2H}px;
    " title="CF 生成額 ${fmtMan(cashGen_man)}">
      ${cfGenLabelHidden ? '' : `<div class="cf-label">CF 生成額</div><div class="cf-amount">${fmtMan(cashGen_man)}</div><div class="cf-breakdown" style="font-size:0.72em; color:#555; margin-top:4px; padding-top:3px; border-top:1px dashed rgba(0,0,0,.18); line-height:1.2;">税引後利益 ${fmtMan(netInc_man)}<br>＋ 減価償却 ${fmtMan(depr_man)}</div>`}
    </div>
  `;

  cfRow.innerHTML = '';
  cfRow.innerHTML = cfHtml;
  // 旧 SVG 矢印は出力しない（撤廃）
  puzzleRow.querySelectorAll('.cf-arrow-svg').forEach(el => el.remove());
}

/* ═══════════════════════════════════════════════════════
 * KPI ストリップ HTML 生成
 * ═══════════════════════════════════════════════════════ */
function buildKpiStrip(bp, op_man_adj) {
  const rev  = bp.revenue || 0;
  const gp   = bp.gross_profit || 0;
  const fc   = (bp.personnel_cost || 0) + (bp.other_fixed_cost || 0);
  const op   = bp.profit || 0;
  const netInc  = bp.net_income || 0;
  const depr    = bp.depreciation || 0;
  const cashGen = bp.cash_generation || (netInc + depr);
  const m = bp.metrics || {};

  const gmPct = m.gross_margin_pct != null
    ? m.gross_margin_pct.toFixed(1) + '%'
    : pctStr(gp, rev);
  const opPctOfRev = rev > 0 ? (op / rev * 100).toFixed(1) + '%' : '—';
  const fcRatio = gp > 0 ? (fc / gp * 100).toFixed(1) + '%' : '—';
  const cfPctOfRev = rev > 0 ? (cashGen / rev * 100).toFixed(1) + '%' : '—';

  return `
    <div class="kpi-strip">
      <div class="kpi-card kpi-revenue">
        <div class="kpi-label">売上高</div>
        <div class="kpi-value">${fmt(rev)}</div>
        <div class="kpi-sub">月平均 約 <strong>${fmt(rev / 12)}</strong></div>
      </div>
      <div class="kpi-card kpi-gross">
        <div class="kpi-label">粗利</div>
        <div class="kpi-value">${fmt(gp)}</div>
        <div class="kpi-sub">粗利率 <strong>${gmPct}</strong></div>
      </div>
      <div class="kpi-card kpi-profit">
        <div class="kpi-label">経常利益</div>
        <div class="kpi-value">${fmt(op)}</div>
        <div class="kpi-sub">売上比 <strong>${opPctOfRev}</strong> ・ 固定費比 <strong>${fcRatio}</strong></div>
      </div>
      <div class="kpi-card kpi-cash">
        <div class="kpi-label">CF 生成額</div>
        <div class="kpi-value">${fmt(cashGen)}</div>
        <div class="kpi-sub">売上比 <strong>${cfPctOfRev}</strong></div>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════
 * ブロックパズル描画
 * ═══════════════════════════════════════════════════════ */
function buildPuzzle(bp) {
  const rev  = bp.revenue          || 0;
  const vc   = bp.variable_cost    || 0;
  const gp   = bp.gross_profit     || 0;
  const fc   = (bp.personnel_cost || 0) + (bp.other_fixed_cost || 0);
  const pc   = bp.personnel_cost   || 0;
  const ofc  = bp.other_fixed_cost || 0;
  const op   = bp.profit           || 0;
  const m    = bp.metrics          || {};

  const hqAlloc       = bp._hq_allocation || null;
  const isCluster     = !!hqAlloc;
  const hqFixed       = hqAlloc ? (hqAlloc.hq_cost_allocated || 0) : 0;
  const hqPersonnel   = hqAlloc ? (hqAlloc.personnel_hq      || 0) : 0;
  const hqOtherFixed  = hqAlloc ? (hqAlloc.other_fixed_hq    || 0) : 0;
  const hqFixed_man      = Math.round(hqFixed      / 10_000);
  const hqPersonnel_man  = Math.round(hqPersonnel  / 10_000);
  const hqOtherFixed_man = Math.round(hqOtherFixed / 10_000);

  /* ── キャンバスサイズ ── */
  const PUZZLE_H = 540;
  const MIN_ROW  = 48;

  /* ── 縦分割 ── */
  const vcH_raw = rev > 0 ? vc / rev * PUZZLE_H : PUZZLE_H / 3;
  const vcH  = clamp(Math.round(vcH_raw), MIN_ROW, PUZZLE_H - 2 * MIN_ROW);
  const gpH  = PUZZLE_H - vcH;

  const MIN_PROFIT = 56;
  const opH_raw = rev > 0 ? op / rev * PUZZLE_H : gpH / 6;
  const opH  = clamp(Math.round(opH_raw), MIN_PROFIT, gpH - 2 * MIN_ROW);

  const subH = gpH - opH;
  const personnelH = fc > 0
    ? clamp(Math.round(subH * pc / fc), 24, subH - 24)
    : Math.round(subH / 2);
  const otherH = subH - personnelH;

  /* ── 横分割 ── */
  const SALES_PCT = 28;
  const rightPct  = 100 - SALES_PCT;

  const totalRight = gp + fc;
  const grossPct   = totalRight > 0 ? (gp / totalRight * rightPct) : rightPct * 0.5;
  const fixedPct   = rightPct - grossPct;

  const FIXED_LABEL_RATIO = 0.40;
  const fixedLabelPct = fixedPct * FIXED_LABEL_RATIO;
  const fixedSubPct   = fixedPct * (1 - FIXED_LABEL_RATIO);

  const grossLeft     = SALES_PCT;
  const fixedLabelLeft = SALES_PCT + grossPct;
  const fixedSubLeft  = SALES_PCT + grossPct + fixedLabelPct;

  /* ── 万円表示の整合性 ── */
  const rev_man  = toMan(rev);
  const gp_man   = toMan(gp);
  const fc_man   = toMan(fc);
  const pc_man   = toMan(pc);
  const vc_man   = rev_man - gp_man;
  const ofc_man  = fc_man - pc_man;
  const op_man_adj = gp_man - fc_man;

  /* ── メトリクス ── */
  const grossMarginStr = m.gross_margin_pct != null
    ? m.gross_margin_pct.toFixed(1) + '%'
    : pctStr(gp, rev);
  const laborShareStr = m.labor_share_pct != null
    ? m.labor_share_pct.toFixed(1) + '%'
    : pctStr(pc, gp);

  const INNER_BORDER = '1px solid rgba(15, 23, 42, 0.06)';

  const html = `
    <div class="puzzle-row-wrap">
    <div class="puzzle-row">
      <div id="puzzle-canvas" style="height:${PUZZLE_H}px; position:relative; overflow:hidden;">

        <!-- ① 売上高 -->
        <div class="bp-cell cell-revenue" style="
          left:0; top:0;
          width:${SALES_PCT}%; height:100%;
          border-right:${INNER_BORDER};
        ">
          <div class="cell-label">売上高</div>
          <div class="cell-amount">${fmtMan(rev_man)}</div>
        </div>

        <!-- ② 変動費 -->
        <div class="bp-cell cell-variable" style="
          left:${SALES_PCT}%; top:0;
          width:${rightPct.toFixed(3)}%; height:${vcH}px;
          border-bottom:${INNER_BORDER};
        ">
          <div class="cell-label">変動費</div>
          <div class="cell-amount">${fmtMan(vc_man)}</div>
        </div>

        <!-- ③ 粗利 -->
        <div class="bp-cell cell-gross" style="
          left:${grossLeft.toFixed(3)}%; top:${vcH}px;
          width:${grossPct.toFixed(3)}%; height:${gpH}px;
          border-right:${INNER_BORDER};
        ">
          <div class="cell-label">粗利</div>
          <div class="cell-amount">${fmtMan(gp_man)}</div>
        </div>

        <!-- ④ 固定費ラベル列 -->
        <div class="bp-cell cell-fixed" style="
          left:${fixedLabelLeft.toFixed(3)}%; top:${vcH}px;
          width:${fixedLabelPct.toFixed(3)}%; height:${subH}px;
          border-right:${INNER_BORDER};
          border-bottom: 1px solid rgba(15, 23, 42, 0.06);
        ">
          ${isCluster && hqFixed_man > 0 ? (() => {
            const hqPct = fc_man > 0 ? hqFixed_man / fc_man : 0;
            const overlayH = Math.round(subH * hqPct);
            const minOverlayH = overlayH < 28 ? 28 : overlayH;
            return `<div class="hq-overlay" style="height:${minOverlayH}px; top:0;">
              <div class="hq-overlay-top" style="height:100%;">
                <div class="hq-overlay-label">本社経費</div>
                <div class="hq-overlay-pct">${(hqPct*100).toFixed(1)}%</div>
              </div>
            </div>`;
          })() : ''}
          <div class="cell-label" style="position:relative; z-index:5;">固定費</div>
          <div class="cell-amount" style="position:relative; z-index:5;">${fmtMan(fc_man)}</div>
        </div>

        <!-- ⑤ 人件費 -->
        <div class="bp-cell cell-personnel" style="
          left:${fixedSubLeft.toFixed(3)}%; top:${vcH}px;
          width:${fixedSubPct.toFixed(3)}%; height:${personnelH}px;
          border-bottom:${INNER_BORDER};
        ">
          ${isCluster && hqPersonnel_man > 0 ? (() => {
            const hqPct = pc_man > 0 ? hqPersonnel_man / pc_man : 0;
            const overlayH = Math.round(personnelH * hqPct);
            const minOverlayH = overlayH < 28 ? 28 : overlayH;
            return `<div class="hq-overlay" style="height:${minOverlayH}px; top:0;">
              <div class="hq-overlay-top" style="height:100%;">
                <div class="hq-overlay-label">本社経費</div>
                <div class="hq-overlay-pct">${(hqPct*100).toFixed(1)}%</div>
              </div>
            </div>`;
          })() : ''}
          <div class="cell-label" style="position:relative; z-index:5;">人件費</div>
          <div class="cell-amount" style="position:relative; z-index:5;">${fmtMan(pc_man)}</div>
        </div>

        <!-- ⑥ その他固定費 -->
        <div class="bp-cell cell-other" style="
          left:${fixedSubLeft.toFixed(3)}%; top:${vcH + personnelH}px;
          width:${fixedSubPct.toFixed(3)}%; height:${otherH}px;
          border-bottom: 1px solid rgba(15, 23, 42, 0.06);
        ">
          ${isCluster && hqOtherFixed_man > 0 ? (() => {
            const hqPct = ofc_man > 0 ? hqOtherFixed_man / ofc_man : 0;
            const overlayH = Math.round(otherH * hqPct);
            const minOverlayH = overlayH < 28 ? 28 : overlayH;
            return `<div class="hq-overlay" style="height:${minOverlayH}px; top:0;">
              <div class="hq-overlay-top" style="height:100%;">
                <div class="hq-overlay-label">本社経費</div>
                <div class="hq-overlay-pct">${(hqPct*100).toFixed(1)}%</div>
              </div>
            </div>`;
          })() : ''}
          <div class="cell-label" style="font-size:0.78rem; position:relative; z-index:5;">その他固定費</div>
          <div class="cell-amount" style="position:relative; z-index:5;">${fmtMan(ofc_man)}</div>
        </div>

        <!-- ⑦ 利益 -->
        <div class="bp-cell cell-profit" style="
          left:${fixedLabelLeft.toFixed(3)}%; top:${vcH + subH}px;
          width:${fixedPct.toFixed(3)}%; height:${opH}px;
        ">
          <div class="cell-label">利益</div>
          <div class="cell-amount">${fmtMan(op_man_adj)}</div>
        </div>

        <!-- ⑧ 粗利率タグ（粗利セル右下） -->
        <div class="inline-tag" id="tag-gm" style="
          left:${(grossLeft + grossPct - 1).toFixed(2)}%;
          top:${PUZZLE_H - 32}px;
          transform:translateX(-100%);
        ">
          <span class="tag-label">粗利率</span>
          <span class="tag-value">${grossMarginStr}</span>
        </div>

        <!-- ⑨ 労働分配率タグ（人件費セル右下、HQ オーバーレイと干渉しない位置） -->
        <div class="inline-tag" id="tag-ls" style="
          left:${(fixedSubLeft + fixedSubPct - 1).toFixed(2)}%;
          top:${vcH + personnelH - 32}px;
          transform:translateX(-100%);
        ">
          <span class="tag-label">労働分配率</span>
          <span class="tag-value">${laborShareStr}</span>
        </div>

      </div><!-- /#puzzle-canvas -->
      <!-- CF 拡張エリア -->
      <div id="cf-extension-row" style="height:${PUZZLE_H}px; position:relative;"></div>
    </div><!-- /.puzzle-row -->
    </div><!-- /.puzzle-row-wrap -->
  `;

  return {
    html,
    layout: { vcH, gpH, opH, subH, otherH, personnelH, PUZZLE_H,
              fixedSubLeft, fixedSubPct, SALES_PCT, grossPct, fixedLabelPct,
              op_man_adj }
  };
}

/* ═══════════════════════════════════════════════════════
 * 内訳テーブル
 * ═══════════════════════════════════════════════════════ */
function renderBreakdownItems(items, total) {
  if (!items || !items.length)
    return '<div class="breakdown-item"><span class="item-name">データなし</span></div>';
  return items.map(item => `
    <div class="breakdown-item">
      <span class="item-name">${item.name}</span>
      <span class="item-amount">${fmt(item.value)}</span>
      <span class="item-pct">${pctStr(item.value, total)}</span>
    </div>`).join('');
}

/* ═══════════════════════════════════════════════════════
 * 配賦注記の更新
 * ═══════════════════════════════════════════════════════ */
function updateAllocationNote(selectVal, bp) {
  const noteEl = document.getElementById('cluster-allocation-note');
  if (!noteEl) return;

  if (!selectVal || !selectVal.startsWith('cluster:')) {
    noteEl.style.display = 'none';
    return;
  }

  const clusterName = selectVal.slice('cluster:'.length);
  const hqAlloc = bp && bp._hq_allocation;
  const hqTotal = hqAlloc ? hqAlloc.hq_cost_total : null;
  const hqRatio = clusterName === '工事部' ? 60 : 40;

  let hqAmountStr;
  if (hqTotal != null && hqTotal > 0) {
    const hqMan = Math.round(hqTotal / 10_000);
    hqAmountStr = `約 ${hqMan.toLocaleString()} 万円`;
  } else {
    hqAmountStr = '推定値';
  }

  noteEl.textContent =
    `クラスタ表示: 本社経費（本部 + その他「総務部」推定 ${hqAmountStr}）の ${hqRatio}% を${clusterName}に配賦`;
  noteEl.style.display = 'block';
}

/* ═══════════════════════════════════════════════════════
 * メイン描画
 * ═══════════════════════════════════════════════════════ */
function render(bp, commentary) {
  const rev = bp.revenue          || 0;
  const vc  = bp.variable_cost    || 0;
  const gp  = bp.gross_profit     || 0;
  const pc  = bp.personnel_cost   || 0;
  const ofc = bp.other_fixed_cost || 0;

  const period = bp.period || {};
  const periodStr = period.start && period.end
    ? `${period.start} 〜 ${period.end}`
    : '期間不明';
  document.getElementById('period-label').textContent = periodStr;

  const { html: puzzleHtml, layout } = buildPuzzle(bp);
  const kpiHtml = buildKpiStrip(bp, layout.op_man_adj);

  const html = `
    ${kpiHtml}

    <div class="puzzle-card">
      <div class="card-head">
        <h2>お金のブロックパズル</h2>
        <span class="head-sub">和仁達也方式 ・ 経常利益ベース</span>
      </div>

      <div class="formula-row">
        <span class="formula-chip">売上 ＝ 変動費 ＋ <span class="em" style="color:var(--green-700);">粗利</span></span>
        <span class="formula-divider"></span>
        <span class="formula-chip"><span class="em" style="color:var(--green-700);">粗利</span> ＝ <span class="em" style="color:var(--warn-700);">固定費</span> ＋ <span class="em" style="color:var(--gold-700);">利益</span></span>
        <span class="formula-divider"></span>
        <span class="formula-chip"><span class="em" style="color:var(--warn-700);">固定費</span> ＝ 人件費 ＋ その他固定費</span>
        <span class="formula-divider"></span>
        <span class="formula-chip"><span class="em" style="color:var(--gold-700);">利益</span> − 法人税 ＝ 税引後利益</span>
        <span class="formula-divider"></span>
        <span class="formula-chip">税引後利益 ＋ 減価償却費 ＝ CF生成額</span>
      </div>

      <div class="formula-note">
        ※「利益」は経常利益、「固定費」は販管費から営業外損益を吸収した実質固定費（和仁達也方式準拠）
      </div>

      <div id="cluster-allocation-note"></div>

      ${puzzleHtml}
    </div>

    <div class="commentary-card">
      <h2>AI 簡易分析</h2>
      <div id="commentary-text">${commentary || ''}</div>
    </div>

    <div class="breakdown-section">
      <details>
        <summary>勘定科目分類（ブロックパズル基準）</summary>
        <div class="breakdown-inner">
          <div class="breakdown-grid">
            <div class="breakdown-col">
              <h3>売上高内訳</h3>
              ${renderBreakdownItems(bp.revenue_breakdown, rev)}
            </div>
            <div class="breakdown-col">
              <h3>変動費内訳</h3>
              ${renderBreakdownItems(bp.variable_breakdown, vc)}
            </div>
            <div class="breakdown-col">
              <h3>人件費内訳</h3>
              ${renderBreakdownItems(bp.personnel_breakdown, pc)}
            </div>
            <div class="breakdown-col">
              <h3>その他固定費 上位 10 科目</h3>
              ${renderBreakdownItems((bp.other_fixed_breakdown || []).slice(0, 10), ofc)}
            </div>
          </div>
        </div>
      </details>
    </div>
  `;

  document.getElementById('main-content').innerHTML = html;

  updateAllocationNote(_currentSelectVal, bp);

  requestAnimationFrame(() => renderCFExtension(bp, layout));
}

/* ═══════════════════════════════════════════════════════

let _bpCmt  = '';

window.addEventListener('resize', () => {

  _rTimer = setTimeout(() => {

/* ═══════════════════════════════════════════════════════
 * 更新ボタン + ピル初期化
 * ═══════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('refresh-btn');
  if (btn) {
    // standalone: refresh は再ビルドが必要なため、ボタンを表示更新のみに変更
    btn.textContent = '最終更新: ' + (window.__BUILD_DATE_JST__ || '?');
    btn.disabled = true;
    btn.style.cursor = 'default';
    btn.style.opacity = '0.7';
  }

  // 会計期ピル init (standalone 専用)
  initFyPills();

  // 部門セレクター初期化（DOMContentLoaded 後に非同期実行）
  initDeptSelector();
});

// standalone 専用: 会計期ピルを動的構築して表示
function initFyPills() {
  const pills = document.getElementById('fy-pills');
  if (!pills) return;
  const all = window.__EMBEDDED_DATA__;
  if (!all || !Array.isArray(all.fiscal_years)) return;

  // ボタンを動的生成（埋め込みデータの fiscal_years 配列から）
  pills.innerHTML = '';
  const defaultKey = window.__DEFAULT_FY_KEY__ || all.default_year_key;
  all.fiscal_years.forEach(fy => {
    const btn = document.createElement('button');
    btn.dataset.fyKey = fy.year_key;
    btn.innerHTML = `${fy.year_label}<span class="fy-sub">${fy.period}${fy.data_available ? '' : ' ・データなし'}</span>`;
    if (fy.year_key === defaultKey) btn.classList.add('active');
    pills.appendChild(btn);
  });
  pills.style.display = 'inline-flex';

  pills.addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-fy-key]');
    if (!btn) return;
    pills.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
    window.__currentFyKey = btn.dataset.fyKey;
    const label = btn.textContent.trim();
    document.getElementById('main-content').innerHTML =
      `<div class="loading">${label} のデータを読み込んでいます...</div>`;
    try {
      const result = await loadData(_currentSelectVal);
      if (result._no_data) {
        // データなし期: 明示プレースホルダー
        document.getElementById('main-content').innerHTML = renderNoDataPlaceholder(result);
        document.getElementById('period-label').textContent =
          (result._fy_label || '') + ' ' + (result._fy_period || '');
        _bpData = null;
        _bpCmt = '';
        return;
      }
      _bpData = result.bp;
      _bpCmt  = result.commentary;
      render(result.bp, result.commentary);
      // period-label を上書き
      if (result._fy_label) {
        document.getElementById('period-label').textContent =
          result._fy_label + ' ' + (result._fy_period || '');
      }
    } catch (err) {
      document.getElementById('main-content').innerHTML =
        `<div class="error-msg">データ読み込みエラー: ${err.message}</div>`;
    }
  });
}

// データなし期用のプレースホルダー HTML
function renderNoDataPlaceholder(result) {
  const label = (result._fy_label || '') + ' ' + (result._fy_period || '');
  const note = result._fy_note || 'データなし';
  return `
    <div class="no-data-block">
      <div class="no-data-title">${label} はまだデータがありません</div>
      <div class="no-data-note">${note}</div>
      <div class="no-data-hint">他の会計期に切り替えて閲覧できます。</div>
    </div>
  `;
}

(async () => {
  try {
    const result = await loadData(_currentSelectVal);
    if (result._no_data) {
      document.getElementById('main-content').innerHTML = renderNoDataPlaceholder(result);
      document.getElementById('period-label').textContent =
        (result._fy_label || '') + ' ' + (result._fy_period || '');
      _bpData = null;
      _bpCmt = '';
      return;
    }
    _bpData = result.bp;
    _bpCmt  = result.commentary;
    render(result.bp, result.commentary);
    if (result._fy_label) {
      document.getElementById('period-label').textContent =
        result._fy_label + ' ' + (result._fy_period || '');
    }
  } catch (e) {
    document.getElementById('main-content').innerHTML =
      `<div class="error-msg">データ読み込みエラー: ${e.message}</div>`;
  }
})();
</script>
